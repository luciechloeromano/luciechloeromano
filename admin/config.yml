backend:
  name: git-gateway
  branch: main
  identity_url: https://luiechloeromano.netlify.app/.netlify/identity
  gateway_url: https://luiechloeromano.netlify.app/.netlify/git

media_folder: "images"
public_folder: "/images"

collections:
  - name: "portfolio"
    label: "Portfolio"
    folder: "content/portfolio"
    create: true
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Photo", name: "image", widget: "image"}
      - {label: "Description", name: "description", widget: "text"}
